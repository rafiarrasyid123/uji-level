<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil Saya - Raffz Motor</title>
    <link href="/src/output.css" rel="stylesheet" />
  </head>
  <body class="bg-slate-50 min-h-screen font-sans">
    <nav
      class="fixed top-0 left-0 right-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200"
    >
      <div
        class="max-w-screen-xl mx-auto px-4 py-3 flex items-center justify-between gap-4"
      >
        <a href="./produk.html" class="flex items-center gap-3">
          <div class="bg-blue-600 p-1.5 rounded-lg shadow-lg shadow-blue-200">
            <svg
              class="w-6 h-6 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z"
              />
            </svg>
          </div>
          <span
            class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-sky-500"
            >Raffz Motor</span
          >
        </a>

        <div class="flex items-center gap-3">
          <a
            href="./produk.html"
            class="text-sm font-semibold text-blue-600 hover:bg-blue-50 px-4 py-2 rounded-xl transition"
            >Kembali Belanja</a
          >
          <div class="relative">
            <button
              id="dropdownAvatarNameButton"
              class="flex items-center gap-2 p-1 pr-3 text-sm font-medium text-slate-700 rounded-full hover:bg-slate-100 transition focus:ring-4 focus:ring-blue-100"
              type="button"
            >
              <img
                class="w-8 h-8 rounded-full border border-blue-200"
                src="../Profile/alya.jpeg"
                alt="user photo"
              />
              <span id="dropdown-name-button" class="hidden sm:inline"
                >User</span
              >
              <svg
                class="w-4 h-4 text-slate-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </button>
            <div
              id="dropdownAvatarName"
              class="z-50 hidden absolute right-0 mt-2 w-64 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden"
            >
              <ul class="p-2 text-sm font-medium">
                <li>
                  <a
                    href="./produk.html"
                    class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-blue-50 rounded-xl transition"
                    >Produk</a
                  >
                </li>
                <li class="mt-1 pt-1 border-t border-slate-100">
                  <button
                    id="logout-nav-btn"
                    class="flex items-center gap-3 w-full px-3 py-2.5 text-red-500 hover:bg-red-50 rounded-xl transition"
                  >
                    Keluar
                  </button>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="pt-24 pb-20">
      <section class="max-w-screen-xl mx-auto px-4">
        <!-- Profile Header Card -->
        <div
          class="relative overflow-hidden rounded-[32px] bg-gradient-to-r from-blue-600 to-sky-400 p-8 md:p-12 shadow-2xl shadow-blue-200 mb-8 text-center md:text-left"
        >
          <div
            class="relative z-10 flex flex-col md:flex-row items-center gap-6"
          >
            <div class="relative">
              <img
                id="profile-img"
                src="../Profile/alya.jpeg"
                class="w-28 h-28 md:w-32 md:h-32 rounded-full border-4 border-white/30 shadow-xl object-cover"
                alt="Profile"
              />
              <div
                class="absolute bottom-1 right-1 bg-green-500 w-6 h-6 rounded-full border-4 border-white"
              ></div>
            </div>
            <div>
              <h1
                id="akun-nama"
                class="text-3xl md:text-4xl font-extrabold text-white"
              >
                Memuat...
              </h1>
              <p id="akun-username" class="text-blue-100 text-lg opacity-90">
                @username
              </p>
            </div>
          </div>
          <div
            class="absolute -top-12 -right-12 w-64 h-64 bg-white/10 rounded-full blur-3xl"
          ></div>
        </div>

        <!-- Detail Information -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
          <div class="lg:col-span-2 space-y-6">
            <div
              class="bg-white rounded-[24px] p-8 border border-slate-100 shadow-sm"
            >
              <h2
                class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2"
              >
                <svg
                  class="w-5 h-5 text-blue-600"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                  />
                </svg>
                Informasi Pribadi
              </h2>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                  <label
                    class="text-xs font-bold text-slate-400 uppercase tracking-wider"
                    >Nama Lengkap</label
                  >
                  <div
                    id="nama-card"
                    class="bg-slate-50 p-4 rounded-2xl text-slate-700 font-semibold border border-slate-100"
                  >
                    User
                  </div>
                </div>
                <div class="space-y-1">
                  <label
                    class="text-xs font-bold text-slate-400 uppercase tracking-wider"
                    >Username</label
                  >
                  <div
                    id="username-card"
                    class="bg-slate-50 p-4 rounded-2xl text-slate-700 font-semibold border border-slate-100"
                  >
                    @username
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Sidebar Actions -->
          <div class="space-y-6">
            <div
              class="bg-white rounded-[24px] p-6 border border-slate-100 shadow-sm"
            >
              <h3 class="font-bold text-slate-800 mb-4">Pengaturan Akun</h3>
              <div class="space-y-2">
                <button
                  class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-50 text-slate-600 font-medium transition flex items-center justify-between group"
                >
                  Edit Profil
                  <svg
                    class="w-4 h-4 text-slate-300 group-hover:text-blue-500 transition"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M9 5l7 7-7 7"
                    />
                  </svg>
                </button>
                <button
                  class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-50 text-slate-600 font-medium transition flex items-center justify-between group"
                >
                  Keamanan
                  <svg
                    class="w-4 h-4 text-slate-300 group-hover:text-blue-500 transition"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M9 5l7 7-7 7"
                    />
                  </svg>
                </button>
                <div class="pt-2">
                  <button
                    id="logout-btn"
                    class="w-full flex items-center justify-center gap-2 bg-red-50 text-red-500 font-bold py-4 rounded-2xl hover:bg-red-500 hover:text-white transition shadow-sm active:scale-95"
                  >
                    <svg
                      class="w-5 h-5"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                      />
                    </svg>
                    Keluar Akun
                  </button>
                </div>
              </div>
            </div>

            <div
              class="bg-blue-600 rounded-[24px] p-6 text-white shadow-xl shadow-blue-200"
            >
              <h3 class="font-bold text-lg mb-2">Butuh Bantuan?</h3>
              <p class="text-blue-100 text-sm mb-4">
                Hubungi tim dukungan kami jika Anda mengalami kendala pada akun
                Anda.
              </p>
              <a
                href="#"
                class="inline-block bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl text-sm font-bold transition"
                >Hubungi CS</a
              >
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/script/akun.js"></script>
    <script src="/script/paksamasuk.js"></script>
  </body>
</html>
