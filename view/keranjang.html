<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keranjang</title>
    <link href="/src/output.css" rel="stylesheet" />
  </head>
  <body class="bg-slate-50 min-h-screen font-sans">
    <nav
      class="fixed top-0 left-0 right-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200"
    >
      <div
        class="max-w-screen-xl mx-auto px-4 py-3 flex items-center justify-between"
      >
        <a href="./index.html" class="flex items-center gap-3">
          <div class="bg-blue-600 p-1.5 rounded-lg shadow-lg">
            <svg
              class="w-6 h-6 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z"
              />
            </svg>
          </div>
          <span
            class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-sky-500 uppercase tracking-tighter"
            >Raffz Motor</span
          >
        </a>
        <a
          href="./produk.html"
          class="text-sm font-black uppercase tracking-tighter text-slate-600 hover:text-blue-600 transition"
          >Kembali Belanja</a
        >
      </div>
    </nav>

    <main class="max-w-screen-xl mx-auto px-4 pt-28 pb-20">
      <div class="mb-12">
        <h1
          class="text-5xl lg:text-7xl font-black text-slate-900 leading-[0.85] tracking-tighter italic uppercase"
        >
          Pesanan <br /><span class="text-blue-600">Anda.</span>
        </h1>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
        <div class="lg:col-span-2 space-y-6" id="cart-items"></div>

        <div class="lg:col-span-1">
          <div
            class="bg-white rounded-[40px] p-8 border border-slate-100 shadow-xl shadow-blue-900/5 sticky top-28"
          >
            <h2
              class="text-xl font-black text-slate-900 uppercase tracking-tighter mb-6 italic"
            >
              Ringkasan Biaya
            </h2>

            <div class="mb-6">
              <label
                class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block"
                >Metode Pembayaran</label
              >
              <div class="space-y-2">
                <label
                  class="flex items-center gap-3 p-3 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer hover:border-blue-200 transition-all"
                >
                  <input
                    type="radio"
                    name="payment-method"
                    value="COD"
                    checked
                    class="w-4 h-4 text-blue-600 focus:ring-blue-500"
                  />
                  <span class="text-sm font-bold text-slate-700"
                    >Cash on Delivery (COD)</span
                  >
                </label>
                <label
                  class="flex items-center gap-3 p-3 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer hover:border-blue-200 transition-all"
                >
                  <input
                    type="radio"
                    name="payment-method"
                    value="Transfer Bank"
                    class="w-4 h-4 text-blue-600 focus:ring-blue-500"
                  />
                  <span class="text-sm font-bold text-slate-700"
                    >Transfer Bank</span
                  >
                </label>
              </div>
            </div>

            <div class="space-y-4 mb-8">
              <div class="flex justify-between text-slate-500 font-medium">
                <span>Subtotal</span>
                <span id="subtotal-display">Rp 0</span>
              </div>
              <div class="flex justify-between text-slate-500 font-medium">
                <span>Pajak (0%)</span>
                <span>Rp 0</span>
              </div>
              <div
                class="pt-4 border-t border-slate-50 flex justify-between items-end"
              >
                <span
                  class="text-sm font-black text-slate-400 uppercase tracking-widest"
                  >Total Bayar</span
                >
                <span
                  id="cart-total"
                  class="text-3xl font-black text-blue-600 tracking-tighter"
                  >Rp 0</span
                >
              </div>
            </div>
            <button
              id="checkout-btn"
              class="w-full py-5 bg-slate-900 text-white font-black rounded-full hover:bg-blue-600 transition-all shadow-xl shadow-slate-200 uppercase tracking-widest text-xs mb-4 active:scale-95"
            >
              Checkout Sekarang
            </button>
            <button
              id="clear-cart"
              class="w-full py-4 text-slate-400 font-black hover:text-red-500 transition-all uppercase tracking-widest text-[10px]"
            >
              Kosongkan Keranjang
            </button>
          </div>
        </div>
      </div>
    </main>

    <script src="/script/keranjang.js"></script>
  </body>
</html>
