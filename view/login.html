<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Raffz Motor</title>
    <link href="/src/output.css" rel="stylesheet" />
  </head>
  <body class="bg-slate-50 min-h-screen font-sans flex flex-col">
    <nav
      class="fixed top-0 left-0 right-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200"
    >
      <div
        class="max-w-screen-xl mx-auto px-4 py-3 flex items-center justify-between"
      >
        <a href="./home.html" class="flex items-center gap-3">
          <div class="bg-blue-600 p-1.5 rounded-lg shadow-lg">
            <svg
              class="w-6 h-6 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z"
              />
            </svg>
          </div>
          <span
            class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-sky-500"
            >Raffz Motor</span
          >
        </a>
      </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-4 pt-24">
      <div
        class="w-full max-w-5xl bg-white rounded-[40px] shadow-2xl overflow-hidden flex flex-col md:flex-row border border-slate-100"
      >
        <div
          class="flex-1 bg-slate-950 p-12 text-white flex flex-col justify-center relative overflow-hidden"
        >
          <div class="relative z-10">
            <h1
              class="text-5xl lg:text-7xl font-black leading-[0.85] tracking-tighter mb-6 italic"
            >
              WELCOME <br /><span class="text-blue-600">BACK.</span>
            </h1>
            <p class="text-slate-400 max-w-xs text-sm leading-relaxed">
              Masuk ke akun Anda untuk melanjutkan perjalanan dan melihat
              koleksi motor terbaru kami.
            </p>
          </div>
          <div
            class="absolute -bottom-20 -left-20 w-64 h-64 bg-blue-600/20 rounded-full blur-3xl"
          ></div>
        </div>

        <div class="flex-1 p-8 lg:p-16">
          <form id="loginForm" class="space-y-6">
            <div>
              <label
                class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 block"
                >Username</label
              >
              <input
                type="text"
                id="username"
                class="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-600 transition-all font-semibold text-slate-900"
                placeholder="Masukkan username"
              />
            </div>
            <div class="relative">
              <label
                class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 block"
                >Password</label
              >
              <input
                type="password"
                id="password"
                class="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-600 transition-all font-semibold text-slate-900"
                placeholder="••••••••"
              />
              <button
                type="button"
                id="togglePassword"
                class="absolute right-4 bottom-4 text-slate-400 hover:text-blue-600 transition"
              >
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
              </button>
            </div>

            <div id="hasil"></div>

            <button
              type="submit"
              class="w-full py-5 bg-blue-600 text-white font-black rounded-full hover:bg-slate-900 transition-all shadow-xl shadow-blue-100 uppercase tracking-tighter active:scale-95"
            >
              Masuk Sekarang
            </button>
          </form>

          <p class="mt-8 text-center text-sm font-bold text-slate-500">
            Belum punya akun?
            <a href="./register.html" class="text-blue-600 hover:underline"
              >Daftar gratis</a
            >
          </p>
        </div>
      </div>
    </main>

    <script src="/script/login.js"></script>
  </body>
</html>
