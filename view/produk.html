<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produk</title>
    <link href="/src/output.css" rel="stylesheet" />
  </head>
  <body class="bg-slate-50 min-h-screen font-sans">
    <nav
      class="fixed top-0 left-0 right-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200"
    >
      <div
        class="max-w-screen-xl mx-auto px-4 py-3 flex items-center justify-between gap-4"
      >
        <a href="./produk.html" class="flex items-center gap-3">
          <div class="bg-blue-600 p-1.5 rounded-lg shadow-lg shadow-blue-200">
            <svg
              class="w-6 h-6 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z"
              />
            </svg>
          </div>
          <span
            class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-sky-500"
            >Raffz Motor</span
          >
        </a>

        <div class="hidden md:block relative flex-1 max-w-md mx-8">
          <div
            class="absolute inset-y-0 left-3 flex items-center pointer-events-none"
          >
            <svg
              class="w-4 h-4 text-slate-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              />
            </svg>
          </div>
          <input
            type="text"
            id="search-desktop"
            data-product-search
            class="w-full pl-10 pr-4 py-2 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 transition-all text-sm"
            placeholder="Cari motor impian Anda..."
          />
        </div>

        <div class="flex items-center gap-3">
          <a
            href="./keranjang.html"
            class="p-2 text-slate-600 hover:bg-slate-100 rounded-full transition relative"
            title="Keranjang"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
              />
            </svg>
            <span
              id="cart-badge"
              class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden"
              >0</span
            >
          </a>

          <div class="relative">
            <button
              id="dropdownAvatarNameButton"
              class="flex items-center gap-2 p-1 pr-3 text-sm font-medium text-slate-700 rounded-full hover:bg-slate-100 transition focus:ring-4 focus:ring-blue-100"
              type="button"
            >
              <span class="sr-only">Open user menu</span>
              <img
                class="w-8 h-8 rounded-full border border-blue-200"
                src="../Profile/alya.jpeg"
                alt="user photo"
              />
              <span id="dropdown-name-button" class="hidden sm:inline"
                >User</span
              >
              <svg
                class="w-4 h-4 text-slate-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </button>

            <div
              id="dropdownAvatarName"
              class="z-50 hidden absolute right-0 mt-2 w-64 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden"
            >
              <div class="p-4 bg-slate-50 border-b border-slate-100">
                <div class="flex items-center gap-3">
                  <img
                    class="w-10 h-10 rounded-full border-2 border-white shadow-sm"
                    src="../Profile/alya.jpeg"
                    alt="avatar"
                  />
                  <div class="flex-1 overflow-hidden">
                    <div
                      id="dropdown-name-card"
                      class="font-bold text-slate-800 truncate"
                    >
                      User
                    </div>
                    <div
                      id="dropdown-username-card"
                      class="text-xs text-slate-500 truncate"
                    >
                      @username
                    </div>
                  </div>
                </div>
              </div>
              <ul class="p-2 text-sm font-medium">
                <li>
                  <a
                    href="./Akun.html"
                    class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition group"
                  >
                    <svg
                      class="w-5 h-5 text-slate-400 group-hover:text-blue-500"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                      />
                    </svg>
                    Profil Saya
                  </a>
                </li>
                <li>
                  <a
                    href="./keranjang.html"
                    class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition group"
                  >
                    <svg
                      class="w-5 h-5 text-slate-400 group-hover:text-blue-500"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
                      />
                    </svg>
                    Keranjang
                  </a>
                </li>
                <li class="mt-1 pt-1 border-t border-slate-100">
                  <a
                    id="logout-link"
                    href="#"
                    class="flex items-center gap-3 px-3 py-2.5 text-red-500 hover:bg-red-50 rounded-xl transition"
                  >
                    <svg
                      class="w-5 h-5"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                      />
                    </svg>
                    Keluar
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="pt-24 pb-20">
      <section class="max-w-screen-xl mx-auto px-4">
        <div
          class="relative overflow-hidden rounded-[32px] bg-gradient-to-r from-blue-600 to-sky-400 p-8 md:p-12 shadow-2xl shadow-blue-200"
        >
          <div class="relative z-10 max-w-2xl">
            <h1
              class="text-3xl md:text-5xl font-extrabold text-white leading-tight"
            >
              Halo, <span id="welcome-user" class="text-yellow-300">User</span>!
              👋
            </h1>
            <p class="mt-4 text-blue-50 text-lg md:text-xl opacity-90">
              Temukan koleksi motor impian Anda dengan kualitas terbaik dan
              harga bersaing di Raffz Motor.
            </p>
          </div>
          <div
            class="absolute -top-12 -right-12 w-64 h-64 bg-white/10 rounded-full blur-3xl"
          ></div>
          <div
            class="absolute -bottom-12 -left-12 w-48 h-48 bg-blue-400/20 rounded-full blur-2xl"
          ></div>
        </div>

        <div class="mt-8 md:hidden relative">
          <div
            class="absolute inset-y-0 left-3 flex items-center pointer-events-none"
          >
            <svg
              class="w-5 h-5 text-slate-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              />
            </svg>
          </div>
          <input
            type="text"
            id="search-mobile"
            data-product-search
            class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 shadow-sm text-sm"
            placeholder="Cari motor..."
          />
        </div>
      </section>

      <section class="max-w-screen-xl mx-auto px-4 mt-12">
        <div class="flex items-center justify-between mb-8">
          <div>
            <h2 class="text-2xl md:text-3xl font-bold text-slate-800">
              Katalog Motor
            </h2>
            <div class="h-1.5 w-12 bg-blue-600 rounded-full mt-2"></div>
          </div>
          <div
            id="product-count"
            class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full"
          >
            Memuat...
          </div>
        </div>

        <div
          id="container"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8"
        >
          <!-- Kartu produk akan muncul di sini -->
        </div>
      </section>
    </main>

    <script src="/script/produk.js"></script>
    <script src="/script/paksamasuk.js"></script>
  </body>
</html>
