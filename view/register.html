<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Akun - Raffz Motor</title>
    <link href="/src/output.css" rel="stylesheet" />
  </head>
  <body class="bg-slate-50 min-h-screen font-sans flex flex-col">
    <nav
      class="fixed top-0 left-0 right-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200"
    >
      <div
        class="max-w-screen-xl mx-auto px-4 py-3 flex items-center justify-between"
      >
        <a href="./home.html" class="flex items-center gap-3">
          <div class="bg-blue-600 p-1.5 rounded-lg shadow-lg">
            <svg
              class="w-6 h-6 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z"
              />
            </svg>
          </div>
          <span
            class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-sky-500"
            >Raffz Motor</span
          >
        </a>
      </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-4 pt-24 pb-12">
      <div
        class="w-full max-w-5xl bg-white rounded-[40px] shadow-2xl overflow-hidden flex flex-col md:flex-row-reverse border border-slate-100"
      >
        <div
          class="flex-1 bg-blue-600 p-12 text-white flex flex-col justify-center relative overflow-hidden"
        >
          <div class="relative z-10 text-right">
            <h1
              class="text-5xl lg:text-7xl font-black leading-[0.85] tracking-tighter mb-6 italic"
            >
              JOIN THE <br /><span class="text-slate-950">CLUB.</span>
            </h1>
            <p
              class="text-blue-100 ml-auto max-w-xs text-sm leading-relaxed opacity-80"
            >
              Daftar sekarang dan nikmati kemudahan bertransaksi serta akses
              penuh ke katalog motor impian Anda.
            </p>
          </div>
          <div
            class="absolute -top-20 -right-20 w-64 h-64 bg-white/10 rounded-full blur-3xl"
          ></div>
        </div>

        <div class="flex-1 p-8 lg:p-16">
          <form id="registerForm" class="space-y-4">
            <div>
              <label
                class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1.5 block"
                >Nama Lengkap</label
              >
              <input
                type="text"
                id="nama"
                class="w-full px-6 py-3.5 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-600 transition-all font-semibold text-slate-900"
                placeholder="Masukkan nama Anda"
              />
            </div>
            <div>
              <label
                class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1.5 block"
                >Username</label
              >
              <input
                type="text"
                id="username"
                class="w-full px-6 py-3.5 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-600 transition-all font-semibold text-slate-900"
                placeholder="Pilih username"
              />
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label
                  class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1.5 block"
                  >Password</label
                >
                <input
                  type="password"
                  id="password"
                  class="w-full px-6 py-3.5 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-600 transition-all font-semibold text-slate-900"
                  placeholder="••••••"
                />
              </div>
              <div>
                <label
                  class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1.5 block"
                  >Konfirmasi</label
                >
                <input
                  type="password"
                  id="confirmPassword"
                  class="w-full px-6 py-3.5 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-600 transition-all font-semibold text-slate-900"
                  placeholder="••••••"
                />
              </div>
            </div>

            <div id="hasilRegister"></div>

            <button
              type="submit"
              class="w-full py-5 mt-4 bg-slate-900 text-white font-black rounded-full hover:bg-blue-600 transition-all shadow-xl shadow-slate-200 uppercase tracking-tighter active:scale-95"
            >
              Buat Akun
            </button>
          </form>

          <p class="mt-8 text-center text-sm font-bold text-slate-500">
            Sudah punya akun?
            <a href="./login.html" class="text-blue-600 hover:underline"
              >Masuk di sini</a
            >
          </p>
        </div>
      </div>
    </main>

    <script src="/script/register.js"></script>
  </body>
</html>
